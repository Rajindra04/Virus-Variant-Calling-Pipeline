```yaml
package:
  name:     Virus-Variant-Calling-Pipeline
  version: "1.0.0"

source:
  path: .

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"
  entry_points:
    - dengue_pipeline = run_pipeline:main

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - python >=3.8
    - pandas
    - matplotlib
    - bwa-mem2
    - samtools
    - fastp
    - fastqc
    - gatk4
    - snpeff
    - snpsift
    - ivar
    - bcftools

about:
  home: https://github.com/yourusername/dengue-pipeline
  license: MIT
  license_file: LICENSE
  summary: "A bioinformatics pipeline for variant calling and annotation of dengue virus sequences"
  description: |
    This pipeline processes paired-end FASTQ files to perform read mapping, variant calling,
    consensus sequence generation, and annotation for dengue virus sequences. It includes
    tools for mapping (bwa-mem2), variant calling (GATK), and annotation (SnpEff, SnpSift).
    The pipeline is executed via a single command-line tool, `dengue_pipeline`.
```
